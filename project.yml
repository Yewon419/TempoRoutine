# XcodeGen 프로젝트 정의 — .xcodeproj는 생성물(.gitignore), 이 파일이 소스 (MASTER §5.10)
name: TempoRoutine
options:
  bundleIdPrefix: app.temporoutine
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"

packages:
  TempoCore:
    path: TempoCore

targets:
  TempoRoutine:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - App
    dependencies:
      - package: TempoCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.temporoutine.TempoRoutine
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 6.0
        TARGETED_DEVICE_FAMILY: 1            # P0 = 아이폰만 (§5.10)
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: 템포루틴
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO  # 자체 암호화 없음 — 수출 규정 질문 생략(ASC 실측)
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 4VD7XCCBQN
