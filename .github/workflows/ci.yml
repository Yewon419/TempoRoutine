# 템포루틴 CI (MASTER §5.10)
# 잡 1: TempoCore swift test — 순수 Foundation이라 Linux 러너(공식 Swift 컨테이너)로 분 단위 실행.
# 잡 2(앱 빌드·TestFlight)는 빌드 2에서 활성화 — macOS 러너 이미지·Xcode 버전은 그 시점에 실측(§5.10 추측 금지).

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:   # TestFlight 업로드 = 수동 전용 (배포는 몰아서 — ASC 일일 한도 대응)

jobs:
  tempocore-tests:
    name: TempoCore swift test (Linux)
    runs-on: ubuntu-latest
    container: swift:latest
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build & test
        run: swift test --package-path TempoCore

  app-build:
    name: App build (macOS, unsigned simulator)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: 실측 — Xcode·SDK (§5.10 추측 금지)
        run: |
          sw_vers
          xcodebuild -version
          ls /Applications | grep -i xcode || true
          xcodebuild -showsdks | grep -i ios || true
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Build (simulator, unsigned)
        run: |
          set -o pipefail
          xcodebuild build \
            -project TempoRoutine.xcodeproj \
            -scheme TempoRoutine \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

  testflight:
    name: TestFlight upload (archive + cloud signing)
    needs: [tempocore-tests, app-build]
    # 수동 트리거만 — push마다 업로드하지 않는다(빌드는 몰아서, 2026-07-20 사용자 결정)
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Restore ASC API key
        run: |
          mkdir -p private_keys
          printf '%s' "${{ secrets.ASC_PRIVATE_KEY }}" > "private_keys/AuthKey_${ASC_KEY_ID}.p8"
      - name: Archive (cloud signing)
        run: |
          set -o pipefail
          # archive는 무서명 — 기기 미등록 팀에서 개발 프로파일 요구를 피한다.
          # 배포 서명은 export 단계의 cloud signing이 담당 (실측 이터레이션 1)
          xcodebuild archive \
            -project TempoRoutine.xcodeproj \
            -scheme TempoRoutine \
            -destination 'generic/platform=iOS' \
            -archivePath build/TempoRoutine.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CURRENT_PROJECT_VERSION=$GITHUB_RUN_NUMBER
      - name: Embed entitlements (ad-hoc sign)
        run: |
          # 무서명 archive는 entitlements가 비어 export 재서명 IPA에서 HealthKit이 빠짐(실측: 빌드 20).
          # ad-hoc 서명으로 entitlements를 심으면 export가 이를 보존해 배포 서명에 반영한다.
          codesign --force --sign - \
            --entitlements TempoRoutine.entitlements \
            build/TempoRoutine.xcarchive/Products/Applications/TempoRoutine.app
          codesign -d --entitlements - build/TempoRoutine.xcarchive/Products/Applications/TempoRoutine.app
      - name: Export & upload to TestFlight
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath build/TempoRoutine.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$PWD/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"
      - name: Cleanup key
        if: always()
        run: rm -rf private_keys
