# 템포루틴 CI (MASTER §5.10)
# 잡 1: TempoCore swift test — 순수 Foundation이라 Linux 러너(공식 Swift 컨테이너)로 분 단위 실행.
# 잡 2(앱 빌드·TestFlight)는 빌드 2에서 활성화 — macOS 러너 이미지·Xcode 버전은 그 시점에 실측(§5.10 추측 금지).

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tempocore-tests:
    name: TempoCore swift test (Linux)
    runs-on: ubuntu-latest
    container: swift:latest
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build & test
        run: swift test --package-path TempoCore

  app-build:
    name: App build (macOS, unsigned simulator)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: 실측 — Xcode·SDK (§5.10 추측 금지)
        run: |
          sw_vers
          xcodebuild -version
          ls /Applications | grep -i xcode || true
          xcodebuild -showsdks | grep -i ios || true
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Build (simulator, unsigned)
        run: |
          set -o pipefail
          xcodebuild build \
            -project TempoRoutine.xcodeproj \
            -scheme TempoRoutine \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

  testflight:
    name: TestFlight upload (archive + cloud signing)
    needs: [tempocore-tests, app-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: macos-latest
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Restore ASC API key
        run: |
          mkdir -p private_keys
          printf '%s' "${{ secrets.ASC_PRIVATE_KEY }}" > "private_keys/AuthKey_${ASC_KEY_ID}.p8"
      - name: Archive (cloud signing)
        run: |
          set -o pipefail
          xcodebuild archive \
            -project TempoRoutine.xcodeproj \
            -scheme TempoRoutine \
            -destination 'generic/platform=iOS' \
            -archivePath build/TempoRoutine.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$PWD/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CURRENT_PROJECT_VERSION=$GITHUB_RUN_NUMBER
      - name: Export & upload to TestFlight
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath build/TempoRoutine.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$PWD/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"
      - name: Cleanup key
        if: always()
        run: rm -rf private_keys
